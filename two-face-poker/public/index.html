<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 미니게임</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    background: #0b1120;
    color: #f1f5f9; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; gap: 28px;
  }
  header { text-align: center; }
  header h1 { font-size: 34px; }
  header .sub { color: #94a3b8; font-size: 14px; margin-top: 6px; }

  #games {
    display: grid; gap: 18px; width: 100%; max-width: 860px;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  }
  .card {
    background: rgba(15,23,42,.9);
    border: 1px solid #1e293b; border-radius: 18px;
    padding: 24px 20px; text-align: center; text-decoration: none; color: inherit;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    transition: transform .15s, border-color .15s, box-shadow .15s;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: #fbbf24;
    box-shadow: 0 12px 30px rgba(0,0,0,.45), 0 0 18px rgba(251,191,36,.15);
  }
  .card .emoji { font-size: 46px; }
  .card .name { font-size: 19px; font-weight: 800; }
  .card .desc { font-size: 13px; color: #94a3b8; line-height: 1.5; }
  .card .play {
    margin-top: 6px; background: #16a34a; color: #fff;
    border-radius: 10px; padding: 8px 22px; font-size: 14px; font-weight: 700;
  }

  .card.soon { opacity: .45; cursor: default; }
  .card.soon:hover { transform: none; border-color: #1e293b; box-shadow: none; }
  .card.soon .play { background: #334155; }

  footer { color: #475569; font-size: 12px; }
</style>
</head>
<body>

<header>
  <h1>🎮 미니게임</h1>
  <div class="sub">친구와 함께 즐기는 1:1 온라인 게임 모음</div>
</header>

<div id="games"></div>

<footer>새 게임이 계속 추가됩니다!</footer>

<script>
// ===== 게임 목록 — 새 게임을 만들면 여기에 한 줄만 추가하세요 =====
// { emoji, name, desc, url } — url은 public/ 아래 게임 폴더 경로
const GAMES = [
  {
    emoji: '🂠',
    name: '양면 포커',
    desc: 'White=짝수, Black=홀수. 한 면을 골라 배팅하는 1:1 심리전 카드 게임',
    url: 'poker/',
  },
];

// "준비 중" 자리표시 카드 개수
const COMING_SOON = 2;

const wrap = document.getElementById('games');
wrap.innerHTML =
  GAMES.map(g => `
    <a class="card" href="${g.url}">
      <div class="emoji">${g.emoji}</div>
      <div class="name">${g.name}</div>
      <div class="desc">${g.desc}</div>
      <div class="play">플레이 ▶</div>
    </a>`).join('') +
  Array.from({ length: COMING_SOON }, () => `
    <div class="card soon">
      <div class="emoji">❓</div>
      <div class="name">준비 중</div>
      <div class="desc">새로운 미니게임이 곧 추가됩니다</div>
      <div class="play">Coming Soon</div>
    </div>`).join('');
</script>
</body>
</html>
